<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background card -->
  <rect width="512" height="512" rx="96" fill="#0e0e0f"/>

  <!-- Clapperboard top stripes -->
  <g clip-path="inset(0 0 358 0)">
    <polygon points="-50,0   60,0   30,154  -80,154"  fill="#f0c040"/>
    <polygon points="60,0    170,0  140,154  30,154"  fill="#3c3010"/>
    <polygon points="170,0   280,0  250,154 140,154"  fill="#f0c040"/>
    <polygon points="280,0   390,0  360,154 250,154"  fill="#3c3010"/>
    <polygon points="390,0   500,0  470,154 360,154"  fill="#f0c040"/>
    <polygon points="500,0   570,0  580,154 470,154"  fill="#3c3010"/>
  </g>

  <!-- Divider bar -->
  <rect x="0" y="154" width="512" height="22" fill="#f0c040"/>

  <!-- "ST" monogram -->
  <text x="256" y="408"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="220"
        fill="#f0c040"
        text-anchor="middle">ST</text>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="95" fill="none" stroke="#32323a" stroke-width="2"/>
</svg>
